<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Memory magnets family timeline</title>
  <desc id="desc">A family memory magnet display arranged as a timeline of travel, wedding, and childhood moments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8ea"/>
      <stop offset="1" stop-color="#ead9bb"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1a1a1d" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <path d="M150 310c115-135 260 92 390-35 75-72 130-70 210-12" fill="none" stroke="#b7935b" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 18"/>
  <g filter="url(#drop)">
    <g transform="rotate(-8 200 240)">
      <rect x="130" y="150" width="150" height="125" rx="18" fill="#fff"/>
      <rect x="148" y="168" width="114" height="72" rx="10" fill="#91b7dd"/>
      <path d="M148 240l42-36 28 25 44-44v55z" fill="#3f6d50"/>
      <circle cx="270" cy="160" r="12" fill="#b7935b"/>
    </g>
    <g transform="rotate(6 385 330)">
      <rect x="300" y="250" width="170" height="140" rx="18" fill="#fff"/>
      <rect x="320" y="272" width="130" height="82" rx="10" fill="#f7c7b2"/>
      <circle cx="385" cy="310" r="30" fill="#7b543d"/>
      <circle cx="385" cy="305" r="22" fill="#ffd5bf"/>
      <circle cx="460" cy="260" r="12" fill="#b7935b"/>
    </g>
    <g transform="rotate(-3 585 220)">
      <rect x="505" y="140" width="160" height="135" rx="18" fill="#fff"/>
      <rect x="525" y="162" width="120" height="78" rx="10" fill="#b9d9ac"/>
      <path d="M525 240l48-48 25 24 32-38 15 62z" fill="#456d52"/>
      <circle cx="655" cy="150" r="12" fill="#b7935b"/>
    </g>
    <g transform="rotate(4 675 400)">
