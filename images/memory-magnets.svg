      <path d="M630 380h88M630 412h62" stroke="#2f3640" stroke-width="8" stroke-linecap="round"/>
      <circle cx="738" cy="340" r="12" fill="#b7935b"/>
    </g>
  </g>
  <text x="450" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#2f3640">Memory Magnets That Tell Your Story</text>
