<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Custom photo magnet design tools</title>
  <desc id="desc">A custom photo magnet layout with text, crop handles, and finish choices.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f0e2"/>
      <stop offset="1" stop-color="#d9c59c"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1a1a1d" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <rect x="90" y="90" width="720" height="420" rx="30" fill="#fff" filter="url(#drop)"/>
  <rect x="130" y="130" width="390" height="300" rx="24" fill="#eef1f2"/>
  <rect x="160" y="160" width="330" height="210" rx="18" fill="#87afd1"/>
  <circle cx="240" cy="220" r="34" fill="#f2c867"/>
  <path d="M160 370l92-92 58 52 54-68 126 108z" fill="#456b52"/>
  <rect x="150" y="145" width="350" height="240" rx="20" fill="none" stroke="#b7935b" stroke-width="6" stroke-dasharray="16 12"/>
  <circle cx="150" cy="145" r="11" fill="#b7935b"/>
  <circle cx="500" cy="145" r="11" fill="#b7935b"/>
  <circle cx="150" cy="385" r="11" fill="#b7935b"/>
  <circle cx="500" cy="385" r="11" fill="#b7935b"/>
  <text x="325" y="414" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#2f3640">Our First Home</text>
  <g transform="translate(570 140)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#2f3640">Customize</text>
    <rect x="0" y="30" width="170" height="18" rx="9" fill="#e8e2d2"/>
    <rect x="0" y="30" width="118" height="18" rx="9" fill="#b7935b"/>
    <rect x="0" y="80" width="170" height="18" rx="9" fill="#e8e2d2"/>
    <rect x="0" y="80" width="86" height="18" rx="9" fill="#2f3640"/>
    <rect x="0" y="132" width="64" height="64" rx="14" fill="#b7935b"/>
    <rect x="82" y="132" width="64" height="64" rx="14" fill="#2f3640"/>
    <rect x="0" y="230" width="190" height="52" rx="26" fill="#b7935b"/>
    <text x="95" y="264" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" fill="#fff">Preview</text>
  </g>
</svg>
