<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Premium photo magnets on a modern refrigerator</title>
  <desc id="desc">A styled kitchen refrigerator displaying family photo magnets, travel memories, and note cards.</desc>
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f0df"/>
      <stop offset="1" stop-color="#e6d7bd"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1">
      <stop offset="0" stop-color="#dfe3e6"/>
      <stop offset=".48" stop-color="#f8fafb"/>
      <stop offset="1" stop-color="#b8c0c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1a1a1d" flood-opacity=".24"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#wall)"/>
  <circle cx="1010" cy="130" r="190" fill="#b7935b" opacity=".16"/>
  <circle cx="160" cy="650" r="230" fill="#2f3640" opacity=".11"/>
  <g filter="url(#shadow)">
    <rect x="290" y="90" width="620" height="650" rx="38" fill="url(#steel)"/>
    <rect x="322" y="130" width="556" height="570" rx="24" fill="#eef1f2" opacity=".65"/>
    <line x1="600" y1="108" x2="600" y2="722" stroke="#aeb7be" stroke-width="8" opacity=".8"/>
    <rect x="628" y="155" width="26" height="150" rx="13" fill="#9ca7ad"/>
  </g>
  <g transform="rotate(-4 430 250)">
    <rect x="360" y="180" width="170" height="130" rx="16" fill="#fff" filter="url(#shadow)"/>
    <rect x="378" y="198" width="134" height="78" rx="10" fill="#8fb4d8"/>
    <circle cx="420" cy="226" r="20" fill="#f9d16f"/>
    <path d="M378 276l42-36 28 24 28-30 36 42z" fill="#426f55"/>
    <circle cx="514" cy="196" r="16" fill="#b7935b"/>
  </g>
  <g transform="rotate(5 690 320)">
    <rect x="610" y="230" width="190" height="150" rx="18" fill="#fff" filter="url(#shadow)"/>
    <rect x="632" y="252" width="146" height="90" rx="10" fill="#f5c2ad"/>
    <circle cx="704" cy="295" r="36" fill="#77513b"/>
    <circle cx="704" cy="289" r="25" fill="#ffd7bf"/>
    <circle cx="790" cy="245" r="17" fill="#b7935b"/>
  </g>
  <g transform="rotate(-2 455 500)">
    <rect x="350" y="435" width="220" height="145" rx="18" fill="#fff8ea" filter="url(#shadow)"/>
    <path d="M380 485h160M380 520h125M380 555h95" stroke="#2f3640" stroke-width="10" stroke-linecap="round"/>
    <circle cx="548" cy="452" r="17" fill="#b7935b"/>
  </g>
  <g transform="rotate(6 735 530)">
    <rect x="640" y="455" width="190" height="150" rx="20" fill="#fff" filter="url(#shadow)"/>
    <rect x="662" y="477" width="146" height="92" rx="12" fill="#b6d7a8"/>
    <path d="M662 569l50-52 28 32 32-42 36 62z" fill="#3e6b4c"/>
    <circle cx="810" cy="471" r="17" fill="#b7935b"/>
  </g>
  <text x="600" y="770" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#2f3640">Photo magnets made for everyday memories</text>
</svg>
